services:
  postgres:
    # image: postgis/postgis:15-3.4-alpine
    build: .
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tickets_db
    ports:
      - "5432:5432"
    volumes:
      - ticket-resolver-postgres-volume:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ticket-resolver-redis-volume:/data

volumes:
  ticket-resolver-postgres-volume:
  ticket-resolver-redis-volume:
